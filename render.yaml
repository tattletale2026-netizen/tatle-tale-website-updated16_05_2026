services:
  - type: web
    name: tatle-tale-website
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 90
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: MAX_BOOKINGS
        value: "10"
